name: JAVA CI
on:
 push:
   branches: ["master"]
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: checkout code
       uses: actions/checkout@v4
     - name:  setup java s/w
       uses: actions/setup-java@v4
       with:
         distribution: 'temurin'
         java-version: '17'
     - name: Compile Java code
       run: javac Msg.java
     - name: run java code
       run: java Msg
      
